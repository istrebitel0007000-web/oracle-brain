name: Oracle Brain CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-mock

      - name: Run tests
        env:
          FLASK_ENV: testing
          SECRET_KEY: test-secret-key-ci
          GROQ_KEY_1: fake-groq-key-for-testing
          RATE_LIMIT_ENABLED: "true"
          RATE_PER_MINUTE: "1000"
          RATE_PER_HOUR: "10000"
          RATE_PER_DAY: "100000"
        run: |
          pytest tests/ -v --tb=short --cov=oracle_brain --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install linters
        run: pip install ruff
      - name: Lint with ruff
        run: ruff check oracle_brain/ app.py --select E,F,W --ignore E501
